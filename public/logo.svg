<svg viewBox="0 0 260 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    JI monogram for JP Intelligence
    Recreation of the rounded horseshoe "J" + diagonal "i" with dot mark
    Cream color #EDE9E3 on transparent background
  -->

  <!-- ── Left shape: rounded J/C horseshoe ───────────────────── -->
  <!--
    Thick rounded open-rectangle, like a J:
    Top arm → left side curve → bottom U-curve → right inner arm
    Open on the upper-right
  -->
  <path
    d="
      M 128 28
      L 68 28
      Q 28 28 28 68
      L 28 192
      Q 28 232 68 232
      Q 108 232 108 192
      L 108 175
      Q 108 158 125 158
      Q 142 158 142 175
      L 142 192
    "
    stroke="#EDE9E3"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- ── Right shape: stylised "i" — two diverging legs + dot ── -->
  <!--
    Dot above, then two diagonal strokes spreading downward like
    an inverted chevron / the bottom half of an "A"
  -->
  <circle cx="204" cy="52" r="20" fill="#EDE9E3"/>

  <!-- Left leg of the i -->
  <line
    x1="192" y1="100"
    x2="165" y2="228"
    stroke="#EDE9E3"
    stroke-width="34"
    stroke-linecap="round"
  />

  <!-- Right leg of the i -->
  <line
    x1="205" y1="100"
    x2="237" y2="228"
    stroke="#EDE9E3"
    stroke-width="34"
    stroke-linecap="round"
  />
</svg>
